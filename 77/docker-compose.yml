services:
  bot:
    container_name: vk_bot
    build: .
    ports:
      - "5002:5000"
    environment:
      - GROUP_TOKEN=${GROUP_TOKEN}
      - GROUP_ID=${GROUP_ID}
      - CONFIRM_TOKEN=${CONFIRM_TOKEN}
      - CHANNEL=${CHANNEL}
      - HUB_URL=${HUB_URL}
    volumes:
      - .:/app
    working_dir: /app
    restart: unless-stopped

  webui:
    container_name: vk_bot_ui
    build: .
    ports:
      - "5001:5001"
    environment:
      - WEBUI_PORT=5001
    command: python webui.py
    volumes:
      - .:/app
    working_dir: /app
    restart: unless-stopped