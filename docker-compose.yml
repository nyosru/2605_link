services:
    ii_factory_app:
        build:
          context: ./docker/php
          dockerfile: Dockerfile
        container_name: ii_factory_app
        working_dir: /var/www/html
        volumes:
          - .:/var/www/html
        ports:
          - "8077:8000"
        environment:
          - DB_CONNECTION=sqlite
          - DB_DATABASE=/var/www/html/database/database.sqlite
          - OPENCODE_URL=http://opencode:8080
        command: php artisan serve --host=0.0.0.0 --port=8000
        depends_on:
          opencode:
            condition: service_started

    ii_factory_listener:
        build:
          context: ./docker/php
          dockerfile: Dockerfile
        container_name: ii_factory_listener
        working_dir: /var/www/html
        volumes:
          - .:/var/www/html
        environment:
          - DB_CONNECTION=sqlite
          - DB_DATABASE=/var/www/html/database/database.sqlite
          - OPENCODE_URL=http://opencode:8080
        command: php artisan messages:listen
        depends_on:
          opencode:
            condition: service_started
        restart: unless-stopped

    opencode:
        build:
          context: ./docker/opencode
          dockerfile: Dockerfile
        container_name: ii_factory_opencode
        environment:
          - OPENCODE_MODEL=opencode/deepseek-v4-flash-free
        volumes:
          - ./AGENTS.md:/agents.md:ro
        ports:
          - "8080:8080"
